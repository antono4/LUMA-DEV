<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface Mockup</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Typing Animation */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex overflow-hidden">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-gray-900 text-gray-300 w-72 flex-shrink-0 flex flex-col h-full fixed md:relative z-30 transition-transform duration-300 ease-in-out transform -translate-x-full md:translate-x-0">
        <!-- New Chat Button -->
        <div class="p-4">
            <button onclick="startNewChat()" class="flex items-center gap-3 w-full bg-gray-800 hover:bg-gray-700 text-white px-4 py-3 rounded-xl transition-colors border border-gray-700">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span class="font-medium text-sm">Obrolan Baru</span>
            </button>
        </div>

        <!-- Chat History -->
        <div class="flex-1 overflow-y-auto px-3 py-2 space-y-1">
            <p class="text-xs font-semibold text-gray-500 px-3 mb-2 mt-4 uppercase tracking-wider">Hari Ini</p>
            <button class="flex items-center gap-3 w-full hover:bg-gray-800 px-3 py-2.5 rounded-lg transition-colors text-left group active-chat bg-gray-800">
                <i data-lucide="message-square" class="w-4 h-4 text-gray-400"></i>
                <span class="text-sm truncate flex-1 text-gray-200">Tanya OpenHands SDK</span>
            </button>
            <button class="flex items-center gap-3 w-full hover:bg-gray-800 px-3 py-2.5 rounded-lg transition-colors text-left group">
                <i data-lucide="message-square" class="w-4 h-4 text-gray-400"></i>
                <span class="text-sm truncate flex-1">Bug Fixing dengan AI</span>
            </button>

            <p class="text-xs font-semibold text-gray-500 px-3 mb-2 mt-6 uppercase tracking-wider">7 Hari Sebelumnya</p>
            <button class="flex items-center gap-3 w-full hover:bg-gray-800 px-3 py-2.5 rounded-lg transition-colors text-left group">
                <i data-lucide="message-square" class="w-4 h-4 text-gray-400"></i>
                <span class="text-sm truncate flex-1">Tutorial Python untuk AI</span>
            </button>
            <button class="flex items-center gap-3 w-full hover:bg-gray-800 px-3 py-2.5 rounded-lg transition-colors text-left group">
                <i data-lucide="message-square" class="w-4 h-4 text-gray-400"></i>
                <span class="text-sm truncate flex-1">Code Review Automation</span>
            </button>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col h-full relative min-w-0 bg-white">
        <!-- Header -->
        <header class="h-14 flex items-center justify-between px-4 border-b border-gray-100 bg-white/80 backdrop-blur-sm sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-100 rounded-lg text-gray-600 transition-colors">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="flex items-center gap-2 cursor-pointer hover:bg-gray-100 px-3 py-1.5 rounded-lg transition-colors">
                    <span class="font-semibold text-gray-700">LUMA</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                </div>
            </div>
            <button class="p-2 hover:bg-gray-100 rounded-lg text-gray-600 transition-colors tooltip" title="Bagikan">
                <i data-lucide="share" class="w-5 h-5"></i>
            </button>
        </header>

        <!-- Chat Feed -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 scroll-smooth">
            <div id="chat-messages" class="max-w-3xl mx-auto space-y-6 pb-20">
                
                <!-- Welcome State -->
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-[60vh] text-center animate-fade-in">
                    <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-indigo-200">
                        <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">Halo! Saya LUMA 👋</h1>
                    <p class="text-gray-500 mb-8 max-w-md">Asisten AI powered by OpenHands. Tanyakan apa saja, saya siap membantu! 🚀</p>
                    
                    <!-- Suggestions -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full max-w-2xl">
                        <button onclick="useSuggestion('Apa itu OpenHands?')" class="text-left p-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors group">
                            <i data-lucide="sparkles" class="w-5 h-5 text-indigo-500 mb-2 group-hover:scale-110 transition-transform"></i>
                            <p class="text-sm font-medium text-gray-700">Apa itu OpenHands?</p>
                            <p class="text-xs text-gray-400 mt-1">AI coding agent platform</p>
                        </button>
                        <button onclick="useSuggestion('Buatkan code Python untuk scrape website')" class="text-left p-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors group">
                            <i data-lucide="code-2" class="w-5 h-5 text-green-500 mb-2 group-hover:scale-110 transition-transform"></i>
                            <p class="text-sm font-medium text-gray-700">Buatkan script Python</p>
                            <p class="text-xs text-gray-400 mt-1">untuk scrape website</p>
                        </button>
                        <button onclick="useSuggestion('Jelaskan cara fix bug dengan OpenHands')" class="text-left p-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors group">
                            <i data-lucide="bug" class="w-5 h-5 text-amber-500 mb-2 group-hover:scale-110 transition-transform"></i>
                            <p class="text-sm font-medium text-gray-700">Fix bug dengan OpenHands</p>
                            <p class="text-xs text-gray-400 mt-1">87% bugs fixed same-day</p>
                        </button>
                        <button onclick="useSuggestion('Tutorial OpenHands SDK untuk pemula')" class="text-left p-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors group">
                            <i data-lucide="book-open" class="w-5 h-5 text-orange-500 mb-2 group-hover:scale-110 transition-transform"></i>
                            <p class="text-sm font-medium text-gray-700">Tutorial OpenHands SDK</p>
                            <p class="text-xs text-gray-400 mt-1">untuk pemula</p>
                        </button>
                    </div>
                </div>

                <!-- Messages will be appended here -->
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-6 pb-4 px-4 md:px-8">
            <div class="max-w-3xl mx-auto relative">
                <form id="chat-form" class="relative flex items-end gap-2 bg-white border border-gray-300 rounded-2xl shadow-sm focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-indigo-500 transition-shadow overflow-hidden p-2">
                    
                    <button type="button" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors flex-shrink-0" title="Lampirkan file">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                    </button>

                    <textarea id="chat-input" rows="1" placeholder="Kirim pesan ke LUMA..." class="w-full max-h-32 py-2.5 px-2 bg-transparent border-none focus:ring-0 resize-none text-gray-700 text-[15px] leading-relaxed" oninput="autoResize(this)"></textarea>

                    <button type="submit" id="send-btn" class="p-2 bg-gray-100 text-gray-400 rounded-full transition-colors flex-shrink-0 mb-0.5 pointer-events-none" disabled>
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </form>
                <div class="text-center mt-2 text-xs text-gray-400">
                    AI dapat membuat kesalahan. Harap periksa kembali informasi penting.
                </div>
            </div>
        </div>
    </main>

    <!-- Templates for Messages -->
    <template id="user-message-template">
        <div class="flex justify-end w-full animate-fade-in mb-6">
            <div class="bg-indigo-50 flex-none px-5 py-3.5 rounded-2xl rounded-tr-sm max-w-[85%] text-[15px] leading-relaxed text-gray-800">
                <span class="message-content whitespace-pre-wrap"></span>
            </div>
        </div>
    </template>

    <template id="ai-message-template">
        <div class="flex gap-4 w-full animate-fade-in mb-6">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center flex-shrink-0 shadow-sm mt-1">
                <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
            </div>
            <div class="flex-1 max-w-[85%] text-[15px] leading-relaxed text-gray-800 message-content prose prose-indigo">
                <!-- Content goes here -->
            </div>
        </div>
    </template>

    <template id="typing-indicator-template">
        <div id="typing-indicator" class="flex gap-4 w-full mb-6">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center flex-shrink-0 mt-1">
                <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
            </div>
            <div class="flex items-center gap-1.5 py-3">
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
            </div>
        </div>
    </template>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // OpenHands API Configuration
        const OPENHANDS_API_KEY = 'sk-oh-7OUzIekYsyyC3sXww71Y4nVE2xJipPuK';
        const OPENHANDS_API_URL = 'https://app.all-hands.dev/api/v1';

        // DOM Elements
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatMessages = document.getElementById('chat-messages');
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');
        const sidebar = document.getElementById('sidebar');
        const mobileOverlay = document.getElementById('mobile-overlay');

        // Toggle Sidebar on Mobile
        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            mobileOverlay.classList.toggle('hidden');
        }

        // Auto Resize Textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight < 128 ? textarea.scrollHeight : 128) + 'px';
            
            // Enable/Disable Send Button
            if (textarea.value.trim().length > 0) {
                sendBtn.classList.remove('bg-gray-100', 'text-gray-400', 'pointer-events-none');
                sendBtn.classList.add('bg-indigo-600', 'text-white', 'hover:bg-indigo-700');
                sendBtn.disabled = false;
            } else {
                sendBtn.classList.add('bg-gray-100', 'text-gray-400', 'pointer-events-none');
                sendBtn.classList.remove('bg-indigo-600', 'text-white', 'hover:bg-indigo-700');
                sendBtn.disabled = true;
            }
        }

        // Handle Enter key (Send without Shift)
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (chatInput.value.trim().length > 0) {
                    chatForm.dispatchEvent(new Event('submit'));
                }
            }
        });

        // Use Suggestion Buttons
        function useSuggestion(text) {
            chatInput.value = text;
            autoResize(chatInput);
            chatInput.focus();
        }

        // Start New Chat (Clear UI)
        function startNewChat() {
            // Remove all messages except welcome screen
            const messages = chatMessages.querySelectorAll('.flex.w-full');
            messages.forEach(msg => msg.remove());
            
            welcomeScreen.classList.remove('hidden');
            if (window.innerWidth < 768) toggleSidebar(); // Close sidebar on mobile
        }

        // Scroll to bottom
        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Handle Form Submit
        chatForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const message = chatInput.value.trim();
            if (!message) return;

            // Hide welcome screen
            if (welcomeScreen && !welcomeScreen.classList.contains('hidden')) {
                welcomeScreen.classList.add('hidden');
            }

            // 1. Add User Message
            const userTemplate = document.getElementById('user-message-template');
            const userNode = userTemplate.content.cloneNode(true);
            userNode.querySelector('.message-content').textContent = message;
            chatMessages.appendChild(userNode);

            // Reset Input
            chatInput.value = '';
            chatInput.style.height = 'auto';
            autoResize(chatInput);
            scrollToBottom();

            // 2. Add Typing Indicator
            const typingTemplate = document.getElementById('typing-indicator-template');
            const typingNode = typingTemplate.content.cloneNode(true);
            chatMessages.appendChild(typingNode);
            scrollToBottom();

            // 3. Call OpenHands API directly
            sendToOpenHands(message);
        });

        // Send message to OpenHands API
        async function sendToOpenHands(userMessage) {
            try {
                // Create conversation
                const createResponse = await fetch(`${OPENHANDS_API_URL}/app-conversations`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${OPENHANDS_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        initial_message: {
                            content: [{ type: 'text', text: userMessage }]
                        },
                        title: `LUMA Chat - ${userMessage.substring(0, 30)}`
                    })
                });

                if (!createResponse.ok) throw new Error('Failed to create conversation');

                const createData = await createResponse.json();
                let conversationId = createData.app_conversation_id;

                // If async, poll for READY status
                if (!conversationId && createData.id) {
                    for (let i = 0; i < 30; i++) {
                        await new Promise(r => setTimeout(r, 2000));
                        
                        const pollResponse = await fetch(
                            `${OPENHANDS_API_URL}/app-conversations/start-tasks?ids=${createData.id}`,
                            {
                                headers: { 'Authorization': `Bearer ${OPENHANDS_API_KEY}` }
                            }
                        );
                        
                        if (pollResponse.ok) {
                            const pollData = await pollResponse.json();
                            if (Array.isArray(pollData) && pollData[0]?.status === 'READY') {
                                conversationId = pollData[0].app_conversation_id;
                                break;
                            }
                        }
                    }
                }

                if (!conversationId) throw new Error('Failed to get conversation ID');

                // Wait for response
                for (let i = 0; i < 30; i++) {
                    await new Promise(r => setTimeout(r, 2000));
                    
                    const eventsResponse = await fetch(
                        `${OPENHANDS_API_URL}/conversation/${conversationId}/events/search?limit=50`,
                        {
                            headers: { 'Authorization': `Bearer ${OPENHANDS_API_KEY}` }
                        }
                    );

                    if (eventsResponse.ok) {
                        const eventsData = await eventsResponse.json();
                        const items = eventsData.items || [];
                        
                        for (let j = items.length - 1; j >= 0; j--) {
                            const event = items[j];
                            
                            // Handle MessageEvent from agent
                            if (event.source === 'agent' && event.kind === 'MessageEvent') {
                                const llmMessage = event.llm_message || {};
                                const content = llmMessage.content || [];
                                
                                for (const item of content) {
                                    if (item.type === 'text' && item.text) {
                                        // Remove typing indicator
                                        const indicator = document.getElementById('typing-indicator');
                                        if (indicator) indicator.remove();

                                        // Add AI Message
                                        const aiTemplate = document.getElementById('ai-message-template');
                                        const aiNode = aiTemplate.content.cloneNode(true);
                                        aiNode.querySelector('.message-content').innerHTML = item.text.replace(/\n/g, '<br>');
                                        chatMessages.appendChild(aiNode);
                                        
                                        lucide.createIcons();
                                        scrollToBottom();
                                        return;
                                    }
                                }
                            }
                            
                            // Handle ActionEvent with FinishAction (actual response)
                            if (event.source === 'agent' && event.kind === 'ActionEvent') {
                                const action = event.action || {};
                                if (action.kind === 'FinishAction' && action.message) {
                                    // Remove typing indicator
                                    const indicator = document.getElementById('typing-indicator');
                                    if (indicator) indicator.remove();

                                    // Add AI Message
                                    const aiTemplate = document.getElementById('ai-message-template');
                                    const aiNode = aiTemplate.content.cloneNode(true);
                                    aiNode.querySelector('.message-content').innerHTML = action.message.replace(/\n/g, '<br>');
                                    chatMessages.appendChild(aiNode);
                                    
                                    lucide.createIcons();
                                    scrollToBottom();
                                    return;
                                }
                            }
                        }
                    }
                }

                // Timeout - show fallback
                showFallbackResponse(userMessage);

            } catch (error) {
                console.error('OpenHands API error:', error);
                showFallbackResponse(userMessage);
            }
        }

        // Fallback response
        function showFallbackResponse(message) {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();

            const response = getSmartResponse(message);
            
            const aiTemplate = document.getElementById('ai-message-template');
            const aiNode = aiTemplate.content.cloneNode(true);
            aiNode.querySelector('.message-content').innerHTML = response;
            chatMessages.appendChild(aiNode);
            
            lucide.createIcons();
            scrollToBottom();
        }

        // Built-in Knowledge Base for offline mode
        function getSmartResponse(userMessage) {
            const msg = userMessage.toLowerCase();
            
            if (msg.includes('openhands') || msg.includes('apa itu')) {
                return `<p><strong>🤖 OpenHands</strong> adalah platform AI coding agent open-source yang powerful!</p>
                <p class="mt-2"><strong>✨ Kapabilitas Utama:</strong></p>
                <ul class="list-disc pl-5 mt-1 space-y-1">
                    <li>🛡️ <strong>Fix Vulnerabilities</strong> - Scan & fix security issues</li>
                    <li>🔍 <strong>Review PRs</strong> - Quality & security review</li>
                    <li>🔄 <strong>Migrate Code</strong> - Legacy modernization</li>
                    <li>🚨 <strong>Triage Incidents</strong> - Debugging & root cause</li>
                </ul>
                <p class="mt-2">💡 <strong>77K+ GitHub Stars!</strong> | 🚀 <strong>87% bugs fixed same-day!</strong></p>
                <p class="mt-2">👉 <a href="https://app.all-hands.dev" target="_blank" class="text-indigo-600 underline">Coba gratis di app.all-hands.dev</a></p>`;
            }
            
            if (msg.includes('halo') || msg.includes('hai') || msg.includes('hi')) {
                return `<p>👋 Halo! Selamat datang!</p>
                <p class="mt-2">Saya <strong>LUMA</strong>, asisten AI powered by <strong>OpenHands</strong>! 🚀</p>
                <p class="mt-2">Tanyakan apa saja tentang:</p>
                <ul class="list-disc pl-5 mt-1 space-y-1">
                    <li>🤖 OpenHands & AI Agent</li>
                    <li>💻 Programming & Coding</li>
                    <li>🛡️ Security & Bug Fixing</li>
                    <li>📚 Edukasi & Tutorial</li>
                </ul>`;
            }
            
            if (msg.includes('python') || msg.includes('code') || msg.includes('script') || msg.includes('kode')) {
                return `<p>💻 Dengan senang hati! Saya bisa bantu programming! 🚀</p>
                <p class="mt-2"><strong>Bahasa yang saya kuasai:</strong></p>
                <ul class="list-disc pl-5 mt-1 space-y-1">
                    <li>🐍 <strong>Python</strong> → Web dev, data science, AI/ML</li>
                    <li>⚡ <strong>JavaScript</strong> → Frontend, backend (Node.js), React</li>
                    <li>☕ <strong>Java</strong> → OOP, Android development</li>
                    <li>🌐 <strong>HTML/CSS</strong> → Web design & styling</li>
                </ul>
                <p class="mt-2">💡 <strong>Tips:</strong> Gunakan <strong>OpenHands</strong> untuk automate coding tasks!</p>`;
            }
            
            if (msg.includes('bug') || msg.includes('error') || msg.includes('fix')) {
                return `<p>🛡️ <strong>OpenHands bisa fix bugs automaticamente!</strong></p>
                <p class="mt-2"><strong>🔧 Bug Fixing dengan OpenHands:</strong></p>
                <ul class="list-disc pl-5 mt-1 space-y-1">
                    <li>Analyzes error logs</li>
                    <li>Identifies root cause</li>
                    <li>Proposes & implements fix</li>
                    <li>Creates PR for review</li>
                </ul>
                <p class="mt-2">📊 <strong>"OpenHands autonomously fixes 87% of bug tickets same-day!"</strong></p>
                <p class="mt-2">👉 <a href="https://app.all-hands.dev" target="_blank" class="text-indigo-600 underline">Mulai fix bugs di app.all-hands.dev</a></p>`;
            }
            
            if (msg.includes('sdk') || msg.includes('tutorial') || msg.includes('belajar')) {
                return `<p>📚 <strong>OpenHands SDK - Build Agents with Python!</strong></p>
                <p class="mt-2"><strong>✨ SDK Features:</strong></p>
                <ul class="list-disc pl-5 mt-1 space-y-1">
                    <li>Model-agnostic (Claude, GPT, Gemini, dll)</li>
                    <li>Tool calling system untuk coding tasks</li>
                    <li>Conversation management</li>
                    <li>Extensible architecture</li>
                </ul>
                <p class="mt-2"><strong>📖 Resources:</strong></p>
                <ul class="list-disc pl-5 mt-1 space-y-1">
                    <li><a href="https://docs.openhands.dev/sdk" target="_blank" class="text-indigo-600 underline">docs.openhands.dev/sdk</a></li>
                    <li><a href="https://github.com/openhands/OpenHands" target="_blank" class="text-indigo-600 underline">GitHub (77K+ stars!)</a></li>
                </ul>`;
            }
            
            // Default response
            return `<p>🙏 Terima kasih atas pesan Anda!</p>
                <p class="mt-2">Saya sedang berjalan dalam <strong>mode offline</strong>. Untuk pengalaman penuh:</p>
                <ul class="list-disc pl-5 mt-1 space-y-1">
                    <li>🌐 <strong>Coba online:</strong> <a href="https://app.all-hands.dev" target="_blank" class="text-indigo-600 underline">app.all-hands.dev</a></li>
                </ul>
                <p class="mt-2">💡 Tanyakan tentang <strong>OpenHands</strong>, <strong>programming</strong>, atau topik lainnya!</p>`;
        }
    </script>
</body>
</html>
